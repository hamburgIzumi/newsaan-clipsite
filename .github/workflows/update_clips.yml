name: Update Twitch Clips Data

on:
  schedule:
    # 毎時0分に自動的に実行
    - cron: '0 * * * *'
  workflow_dispatch: # GitHubリポジトリのActionsタブから手動で即時実行も可能にします

permissions:
  contents: write # リポジトリへの自動プッシュを許可するために必要な権限

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and Update Clips JSON
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python scripts/update_clips.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clips.json
          # データの変更差分がある場合のみ自動でコミットしてPush
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update twitch clips data [skip ci]" && git push)
