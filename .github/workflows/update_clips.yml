name: Update Twitch Clips Data

on:
  schedule:
    # 毎日 UTC 15:00 (日本時間 24:00) に自動的に実行
    - cron: '0 15 * * *'
  workflow_dispatch: # GitHubリポジトリのActionsタブから手動で即時実行も可能にします

permissions:
  contents: write # リポジトリへの自動プッシュを許可するために必要な権限

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and Update Clips JSON
        run: node scripts/update_clips.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clips.json
          # データの変更差分がある場合のみ自動でコミットしてPush
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update twitch clips data [skip ci]" && git push)
